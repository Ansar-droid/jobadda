// Set welcome time
document.getElementById('welcome-time').textContent = getTime();
document.getElementById('date-chip').textContent = getDateLabel();

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function getDateLabel() {
  return new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
}

function scrollToBottom(force) {
  chatBg.scrollTop = chatBg.scrollHeight;
  isAtBottom = true;
  unreadCount = 0;
  scrollDownBtn.classList.remove('show');
  unreadBadge.classList.remove('show');
}

chatBg.addEventListener('scroll', () => {
  const threshold = 100;
  isAtBottom = chatBg.scrollHeight - chatBg.scrollTop - chatBg.clientHeight < threshold;
  if (isAtBottom) {
    scrollDownBtn.classList.remove('show');
    unreadBadge.classList.remove('show');
    unreadCount = 0;
  } else {
    scrollDownBtn.classList.add('show');
  }
});

function addBubble(text, sender) {
  const row = document.createElement('div');
  row.className = 'row ' + sender;
  if (sender === 'bot') {
    const av = document.createElement('div');
    av.className = 'bot-av';
    av.textContent = 'AI';
    row.appendChild(av);
  }
  const bub = document.createElement('div');
  bub.className = 'bubble ' + sender;
  const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  bub.innerHTML = formatted + `<div class="meta"><span class="meta-time">${getTime()}</span>${sender === 'user' ? '<span class="meta-tick">✓✓</span>' : ''}</div>`;
  row.appendChild(bub);
  chatBg.appendChild(row);
  if (isAtBottom) {
    setTimeout(() => scrollToBottom(), 30);
  } else if (sender === 'bot') {
    unreadCount++;
    unreadBadge.textContent = unreadCount;
    unreadBadge.classList.add('show');
    scrollDownBtn.classList.add('show');
  }
  return bub;
}

function showOptionBubbles(options) {
  const row = document.createElement('div');
  row.className = 'row bot';
  const av = document.createElement('div');
  av.className = 'bot-av'; av.textContent = 'AI'; row.appendChild(av);
  const wrap = document.createElement('div');
  wrap.style.display = 'flex'; wrap.style.flexWrap = 'wrap'; wrap.style.gap = '6px';
  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'chip'; btn.innerText = opt;
    btn.onclick = () => sendMessage(opt);
    wrap.appendChild(btn);
  });
  row.appendChild(wrap); chatBg.appendChild(row);
  setTimeout(() => scrollToBottom(), 30);
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'row bot'; row.id = 'typing-row';
  const av = document.createElement('div'); av.className = 'bot-av'; av.textContent = 'AI'; row.appendChild(av);
  const bub = document.createElement('div'); bub.className = 'typing-bub'; bub.innerHTML = '<span></span><span></span><span></span>'; row.appendChild(bub);
  chatBg.appendChild(row);
  if (isAtBottom) setTimeout(() => scrollToBottom(), 30);
}

function removeTyping() {
  const r = document.getElementById('typing-row');
  if (r) r.remove();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function saveLead() {
  const data = {
    sessionId: window.userData.sessionId,
    name: window.userData.name || "",
    mobile: window.userData.phone || "",
    role: window.userData.job || "",
    location: window.userData.city || "",
    district: window.userData.district || "",
    state: window.userData.state || "",
    education: window.userData.education || "",
    exp: window.userData.experience || ""
  };
  fetch("https://script.google.com/macros/s/AKfycbyxfPgO-nFLM4i_72LBnPgxjzCe6XiGsOFfv-sA2R9R07UOXa_Sx-IgCgzAU8riGfC-QA/exec", {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  }).catch(err => console.error("Error saving lead:", err));
}

async function sendMessage(text) {
  const userText = text || msgInput.value.trim();
  if (!userText) {
    msgInput.focus();
    return;
  }

  msgInput.value = ''; 
  msgInput.style.height = 'auto';
  
  // Force keyboard to stay open
  msgInput.focus();

  addBubble(userText, 'user');
  history.push({ role: 'user', content: userText });
  statusEl.textContent = 'typing...';
  showTyping();

  setTimeout(() => {
    removeTyping();

    if (!window.step) {
      const txt = userText.toLowerCase();
      if(txt.includes('hi') || txt.includes('हिं')) currentLang = 'hi';
      else if(txt.includes('ka') || txt.includes('ಕನ್')) currentLang = 'kn';
      else if(txt.includes('te') || txt.includes('తెలు')) currentLang = 'te';
      else if(txt.includes('ta') || txt.includes('தமி')) currentLang = 'ta';
      else if(txt.includes('ma') || txt.includes('മല')) currentLang = 'ml';
      else currentLang = 'en';

      t = translations[currentLang];
      window.userData = {};
      window.userData.sessionId = Date.now();
      window.step = 1;
      addBubble(t.welcome, 'bot');
    }
    else if (window.step === 1) {
      window.userData.name = userText;
      saveLead();
      addBubble(t.askPhone.replace('{name}', userText), 'bot');
      window.step = 2;
    }
    else if (window.step === 2) {
      let phone = userText.replace(/\D/g, '').slice(-10);
      if (!/^[6-9]\d{9}$/.test(phone)) {
        addBubble(t.errPhone, 'bot');
      } else {
        window.userData.phone = phone;
        saveLead();
        addBubble(t.askPin, 'bot');
        window.step = 3;
      }
    }
    else if (window.step === 3) {
      let pin = userText.replace(/\D/g, '');
      if (!/^\d{6}$/.test(pin)) {
        addBubble(t.errPin, 'bot');
      } else {
        fetch(`https://api.postalpincode.in/pincode/${pin}`)
          .then(res => res.json())
          .then(data => {
            removeTyping();
            if (data[0].Status === "Success") {
              const post = data[0].PostOffice[0];
              window.userData.district = post.District;
              window.userData.state = post.State;
              saveLead();
              addBubble(t.pinSuccess.replace('{district}', post.District).replace('{state}', post.State), 'bot');
              addBubble(t.askJob, 'bot');
              showOptionBubbles(["Delivery", "BPO", "Kitchen", "Helper"]);
              window.step = 4;
            } else {
              addBubble(t.errPin, 'bot');
            }
            statusEl.textContent = 'online';
          });
        return; 
      }
    }
    else if (window.step === 4) {
      window.userData.job = userText;
      saveLead();
      addBubble(t.askCity, 'bot');
      showOptionBubbles(["Bangalore", "Chennai"]);
      window.step = 5;
    }
    else if (window.step === 5) {
      window.userData.city = userText;
      saveLead();
      addBubble(t.askExp, 'bot');
      showOptionBubbles(["Fresher", "Experienced"]);
      window.step = 6;
    }
    else if (window.step === 6) {
      window.userData.experience = userText;
      saveLead();
      addBubble(t.askEdu, 'bot');
      showOptionBubbles(["Below 10th", "10th", "12th", "Graduate"]);
      window.step = 7;
    }
    else if (window.step === 7) {
      window.userData.education = userText;
      saveLead();
      let finalSummary = t.summary
        .replace('{name}', window.userData.name).replace('{phone}', window.userData.phone)
        .replace('{district}', window.userData.district).replace('{state}', window.userData.state)
        .replace('{job}', window.userData.job).replace('{city}', window.userData.city)
        .replace('{exp}', window.userData.experience).replace('{edu}', window.userData.education);
      addBubble(finalSummary, 'bot');
      setTimeout(() => showFinalSupportButtons(), 1500);
      window.step = 0; 
    }

    statusEl.textContent = 'online';
    
    // Ensure keyboard stays up for the next input
    if (window.step !== 0) {
       msgInput.focus();
    }
  }, 800);
}
